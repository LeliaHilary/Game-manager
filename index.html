<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Game Dev Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2c3e50; color: #ecf0f1; padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding-bottom: 100px; }
        h1 { text-align: center; color: #3498db; margin-bottom: 30px; }
        .card { background: #34495e; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative; }
        h2 { margin-top: 0; color: #e74c3c; }
        
        .local-backup-bar { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px; }
        .btn-backup { background: #e67e22 !important; font-size: 13px !important; padding: 6px 12px !important; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-restore { background: #2ecc71 !important; font-size: 13px !important; padding: 6px 12px !important; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }

        .login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#2c3e50; z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #34495e; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 320px; border: 2px solid #3498db; }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; background: #2c3e50; border: 1px solid #7f8c8d; border-radius: 4px; color: white; font-size: 16px; box-sizing: border-box; text-align: center; }
        
        .title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px dashed #7f8c8d; }
        .title-label { font-size: 1.5em; font-weight: bold; color: #e74c3c; margin: 0; }
        select.time-select { background: #e74c3c; color: white; border: none; font-size: 1.5em; font-weight: bold; border-radius: 4px; padding: 2px 5px; cursor: pointer; }
        input.time-input { background: transparent; color: #e74c3c; border: none; font-size: 1.5em; font-weight: bold; width: 120px; outline: none; }

        textarea { width: 100%; height: 100px; background: #2c3e50; color: white; border: 1px solid #7f8c8d; border-radius: 4px; padding: 10px; box-sizing: border-box; font-size: 14px; }
        input[type="text"].standard-in { background: #2c3e50; color: white; border: 1px solid #7f8c8d; border-radius: 4px; padding: 8px; width: 70%; box-sizing: border-box; }
        
        button { background: #2ecc71; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-delete { background: #c0392b; padding: 4px 8px; font-size: 12px; margin-left: 10px; color: white; border-radius: 4px; }

        .todo-list { list-style: none; padding: 0; }
        .todo-item { display: flex; align-items: center; justify-content: space-between; background: #2c3e50; padding: 10px; margin-bottom: 8px; border-radius: 4px; }
        .todo-left { display: flex; align-items: center; gap: 10px; width: 80%; }
        .completed { text-decoration: line-through; color: #7f8c8d; }

        .folder-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .char-folder { background: #3498db; color: white; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .char-folder.active { background: #e67e22; }
        .char-delete { background: rgba(0,0,0,0.2); border: none; color: white; border-radius: 50%; width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; }

        .sketch-workspace { background: #2c3e50; color: #ecf0f1; border-radius: 8px; padding: 20px; margin-top: 15px; border: 2px solid #34495e; min-height: 400px; position: relative; }
        .sketch-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #34495e; padding-bottom: 10px; }
        .sketch-char-name { font-size: 1.5em; font-weight: bold; border: 2px solid #3498db; padding: 5px 15px; background: #34495e; border-radius: 6px; color: #3498db; }
        
        .search-wrapper { display: flex; align-items: center; gap: 12px; }
        .sketch-search-banner { background: #2980b9; border-radius: 6px; padding: 5px 10px; display: flex; align-items: center; }
        .sketch-search-banner input { background: transparent; border: none; color: white; font-size: 1em; outline: none; width: 120px; }

        .idea-boxes-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 80px; }
        .red-idea-box { color: white; border-radius: 12px; padding: 15px; font-weight: bold; position: relative; word-wrap: break-word; }
        .idea-box-delete { position: absolute; top: 8px; right: 8px; cursor: pointer; color: white; background: rgba(0,0,0,0.5); border: none; border-radius: 50%; width: 22px; height: 22px; }

        .floating-actions-tray { position: absolute; bottom: 15px; right: 15px; display: flex; gap: 10px; }
        .action-btn { width: 48px; height: 48px; border-radius: 50%; color: white; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.4); }
        .btn-plus { background: #2ecc71; font-size: 26px; font-weight: bold; }

        .idea-popup { background: #34495e; border: 2px solid #2c3e50; border-radius: 8px; padding: 15px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-overlay" id="login-gate">
    <div class="login-box">
        <h2 style="color: #3498db; margin:0; margin-bottom: 5px;">🔒 HQ Authentication</h2>
        <p style="font-size:13px; color:#bdc3c7; margin: 0 0 15px 0;">Enter Account Name and Password</p>
        <input type="text" id="login-username" placeholder="Account Name...">
        <input type="password" id="login-pass-input" placeholder="Password...">
        <button onclick="attemptLogin()" style="width:100%; padding:10px; font-size:16px; margin-top: 10px;">Access Dashboard</button>
        <div id="login-error" style="color:#e74c3c; margin-top:10px; font-size:13px; font-weight:bold;"></div>
    </div>
</div>

<div class="container">
    <h1>🎮 Game Dev HQ 🎮</h1>

    <div class="local-backup-bar">
        <button class="btn-backup" onclick="downloadDataBackup()">💾 Save Dashboard to iPad</button>
        <button class="btn-restore" onclick="document.getElementById('emergency-loader').click()">📂 Load iPad Backup</button>
        <input type="file" id="emergency-loader" accept=".json" style="display: none;" onchange="importDataBackup(event)">
    </div>
    
    <div class="card">
        <div class="title-row">
            <span class="title-label">🎯 Goals for This</span>
            <select id="time-type" class="time-select" onchange="saveTimeSettings()">
                <option value="Week">Week</option>
                <option value="Month">Month</option>
                <option value="Day">Day</option>
            </select>
            <input type="text" id="time-value" class="time-input" value="1" oninput="saveTimeSettings()">
        </div>
        <div style="margin-bottom: 15px;">
            <input type="text" id="new-goal-input" class="standard-in" placeholder="Type a new goal here...">
            <button onclick="addGoal()">Add Goal</button>
        </div>
        <ul id="todo-list" class="todo-list"></ul>
    </div>

    <div class="card">
        <h2>👥 Character Folder Manager</h2>
        <div style="margin-bottom: 15px;">
            <input type="text" id="new-char-input" class="standard-in" placeholder="Type character name here...">
            <button onclick="addCharacter()" style="background: #3498db;">Add Character</button>
        </div>
        <div id="character-folders" class="folder-container"></div>

        <div id="sketch-workspace-box" class="sketch-workspace" style="display: none;">
            <div class="sketch-header">
                <div id="sketch-title" class="sketch-char-name">Character Name</div>
                <div class="search-wrapper">
                    <div class="sketch-search-banner">
                        <input type="text" id="idea-search" placeholder="Search 🔍" oninput="filterIdeas()">
                    </div>
                </div>
            </div>
            <div id="idea-boxes" class="idea-boxes-container"></div>
            
            <div id="idea-popup-box" class="idea-popup">
                <h4 style="margin: 0 0 10px 0;">💡 Write down an idea:</h4>
                <textarea id="new-idea-text" placeholder="Type setting, skill, story beat..."></textarea>
                <div style="margin: 10px 0;">
                    <label>Box Color:</label>
                    <input type="color" id="idea-color" value="#e74c3c">
                </div>
                <div style="margin-top: 10px; display: flex; gap: 10px;">
                    <button onclick="saveNewIdea()">Save Idea</button>
                    <button onclick="toggleIdeaPopup()" style="background:#7f8c8d;">Cancel</button>
                </div>
            </div>

            <div class="floating-actions-tray">
                <div class="action-btn btn-plus" onclick="toggleIdeaPopup()">+</div>
            </div>
        </div>
    </div>
</div>

<script>
    let globalState = { goals: [], chars: [], timeType: "Week", timeValue: "1" };
    let activeCharacterIndex = null;

    const REQUIRED_USER = "Lelia&Hilary";
    const REQUIRED_PASS = "Hilary&Lelia";

    window.onload = function() {
        const localData = localStorage.getItem('backup_state');
        if (localData) {
            globalState = JSON.parse(localData);
            document.getElementById('time-type').value = globalState.timeType || "Week";
            document.getElementById('time-value').value = globalState.timeValue || "1";
            renderGoals();
            renderCharacters();
        }
    };

    function localSave() {
        localStorage.setItem('backup_state', JSON.stringify(globalState));
    }

    window.attemptLogin = function() {
        let userVal = document.getElementById('login-username').value;
        let passVal = document.getElementById('login-pass-input').value;
        if (userVal === REQUIRED_USER && passVal === REQUIRED_PASS) {
            document.getElementById('login-gate').style.display = "none";
        } else {
            document.getElementById('login-error').innerText = "❌ Incorrect Credentials!";
        }
    };

    window.saveTimeSettings = function() {
        globalState.timeType = document.getElementById('time-type').value;
        globalState.timeValue = document.getElementById('time-value').value;
        localSave();
    };

    window.downloadDataBackup = function() {
        const jsonStr = JSON.stringify(globalState);
        const blob = new Blob([jsonStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'game_hq_dashboard_backup.json';
        link.click();
        URL.revokeObjectURL(url);
    };

    window.importDataBackup = function(event) {
        const fileReader = new FileReader();
        fileReader.onload = function(e) {
            try {
                globalState = JSON.parse(e.target.result);
                localSave();
                renderGoals();
                renderCharacters();
                alert("Dashboard recovered! 🎉");
            } catch(err) { alert("Bad backup file."); }
        };
        fileReader.readAsText(event.target.files[0]);
    };

    window.addGoal = function() {
        let input = document.getElementById('new-goal-input');
        if (!input.value.trim()) return;
        globalState.goals.push({ text: input.value, done: false });
        input.value = '';
        renderGoals();
        localSave();
    };

    function renderGoals() {
        let html = '';
        globalState.goals.forEach((goal, i) => {
            html += `<li class="todo-item"><div class="todo-left"><input type="checkbox" ${goal.done ? 'checked' : ''} onchange="toggleGoal(${i})"><span class="${goal.done ? 'completed' : ''}">${goal.text}</span></div><button class="btn-delete" onclick="deleteGoal(${i})">Delete</button></li>`;
        });
        document.getElementById('todo-list').innerHTML = html;
    }

    window.toggleGoal = function(i) {
        globalState.goals[i].done = !globalState.goals[i].done;
        renderGoals();
        localSave();
    };

    window.deleteGoal = function(i) {
        globalState.goals.splice(i, 1);
        renderGoals();
        localSave();
    };

    window.addCharacter = function() {
        let input = document.getElementById('new-char-input');
        if (!input.value.trim()) return;
        globalState.chars.push({ name: input.value, ideas: [] });
        activeCharacterIndex = globalState.chars.length - 1;
        input.value = '';
        renderCharacters();
        openCharacterFolder(activeCharacterIndex);
        localSave();
    };

    function renderCharacters() {
        let html = '';
        globalState.chars.forEach((char, i) => {
            let active = i === activeCharacterIndex ? 'active' : '';
            html += `<div class="char-folder ${active}" onclick="openCharacterFolder(${i})">📁 ${char.name}<button class="char-delete" onclick="event.stopPropagation(); deleteCharacter(${i})">X</button></div>`;
        });
        document.getElementById('character-folders').innerHTML = html;
    }

    window.openCharacterFolder = function(i) {
        activeCharacterIndex = i;
        renderCharacters();
        document.getElementById('sketch-workspace-box').style.display = 'block';
        document.getElementById('sketch-title').innerText = globalState.chars[i].name;
        renderIdeaBoxes();
    };

    function renderIdeaBoxes() {
        let container = document.getElementById('idea-boxes');
        let html = '';
        let ideas = globalState.chars[activeCharacterIndex].ideas || [];
        ideas.forEach((idea, i) => {
            html += `<div class="red-idea-box" style="background: ${idea.color};" data-text="${idea.text.toLowerCase()}">${idea.text}<button class="idea-box-delete" onclick="deleteIdea(${i})">X</button></div>`;
        });
        container.innerHTML = html || '<p style="color:#7f8c8d; text-align:center;">Empty folder. Click + to add an idea.</p>';
    }

    window.toggleIdeaPopup = function() {
        let popup = document.getElementById('idea-popup-box');
        popup.style.display = popup.style.display === 'block' ? 'none' : 'block';
    };

    window.saveNewIdea = function() {
        let text = document.getElementById('new-idea-text').value;
        let color = document.getElementById('idea-color').value;
        if (!text.trim()) return;
        globalState.chars[activeCharacterIndex].ideas.push({ text, color });
        document.getElementById('new-idea-text').value = '';
        toggleIdeaPopup();
        renderIdeaBoxes();
        localSave();
    };

    window.filterIdeas = function() {
        let q = document.getElementById('idea-search').value.toLowerCase();
        let boxes = document.getElementById('idea-boxes').children;
        for (let b of boxes) {
            let txt = b.getAttribute('data-text') || '';
            b.style.display = txt.includes(q) ? 'block' : 'none';
        }
    };

    window.deleteIdea = function(i) {
        globalState.chars[activeCharacterIndex].ideas.splice(i, 1);
        renderIdeaBoxes();
        localSave();
    };

    window.deleteCharacter = function(i) {
        globalState.chars.splice(i, 1);
        activeCharacterIndex = null;
        document.getElementById('sketch-workspace-box').style.display = 'none';
        renderCharacters();
        localSave();
    };
</script>
</body>
</html>
