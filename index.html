<!-- Firebase SDK Integration scripts -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Embedded configuration parameters
    const firebaseConfig = {
        apiKey: "AIzaSyCsqsL4TePZwWhOD6eB0w14Pgi8X1LbHWA",
        authDomain: "game-manager-c30d5.firebaseapp.com",
        projectId: "game-manager-c30d5",
        storageBucket: "game-manager-c30d5.firebasestorage.app",
        messagingSenderId: "872084827373",
        appId: "1:872084827373:web:034270ad67efadc62370e4"
    };

    // Initialize Database
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const docRef = doc(db, "workspace", "dashboardData");

    // Core Local Arrays
    let globalState = { goals: [], chars: [], timeType: "Week", timeValue: "1" };
    let activeCharacterIndex = null;
    let selectedColorFilter = 'all'; 
    let defaultColors = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f', '#9b59b6'];

    const REQUIRED_USER = "Lelia&Hilary";
    const REQUIRED_PASS = "Hilary&Lelia";

    window.onload = async function() {
        document.getElementById('login-gate').style.display = "flex";
        document.getElementById('login-username').focus();
        if(!localStorage.getItem('recentColors')) {
            localStorage.setItem('recentColors', JSON.stringify(defaultColors));
        }

        // Force an initial fetch from the cloud right away on load!
        try {
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                updateDashboardWithData(docSnap.data());
            }
        } catch (e) {
            console.log("Initial cloud read delayed, waiting for sync...");
        }

        // Live Real-Time Data Sync listener
        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                updateDashboardWithData(docSnap.data());
            } else {
                setDoc(docRef, globalState);
            }
        });
    };

    function updateDashboardWithData(data) {
        globalState = data;
        document.getElementById('time-type').value = globalState.timeType || "Week";
        document.getElementById('time-value').value = globalState.timeValue || "1";
        renderGoals();
        renderCharacters();
        if(activeCharacterIndex !== null) {
            renderIdeaBoxes();
            buildColorBallFilters();
        }
    }

    window.attemptLogin = function() {
        let userVal = document.getElementById('login-username').value;
        let passVal = document.getElementById('login-pass-input').value;
        let errorEl = document.getElementById('login-error');

        if (userVal === REQUIRED_USER && passVal === REQUIRED_PASS) {
            document.getElementById('login-gate').style.display = "none";
            errorEl.innerText = "";
        } else {
            errorEl.innerText = "❌ Incorrect Account Name or Password!";
        }
    }

    async function pushToCloud() {
        await setDoc(docRef, globalState);
    }

    window.saveTimeSettings = function() {
        globalState.timeType = document.getElementById('time-type').value;
        globalState.timeValue = document.getElementById('time-value').value;
        pushToCloud();
    }

    /* --- EMERGENCY IPAD MANUAL BACKUP UTILITIES --- */
    window.downloadDataBackup = function() {
        const jsonStr = JSON.stringify(globalState);
        const blob = new Blob([jsonStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'game_hq_dashboard_backup.json';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    };

    window.importDataBackup = function(event) {
        const fileReader = new FileReader();
        fileReader.onload = function(e) {
            try {
                const parsed = JSON.parse(e.target.result);
                if(parsed.goals || parsed.chars) {
                    globalState = parsed;
                    pushToCloud();
                    alert("Dashboard successfully recovered and loaded from iPad backup! 🎉");
                } else {
                    alert("Invalid backup file layout.");
                }
            } catch(err) {
                alert("Error reading file.");
            }
        };
        fileReader.readAsText(event.target.files[0]);
    };

    /* --- GOALS SYSTEM --- */
    function renderGoals() {
        let listHtml = '';
        (globalState.goals || []).forEach((goal, index) => {
            listHtml += `<li class="todo-item"><div class="todo-left"><input type="checkbox" ${goal.done ? 'checked' : ''} onchange="toggleGoal(${index})"><span class="${goal.done ? 'completed' : ''}">${goal.text}</span></div><button class="btn-delete" onclick="deleteGoal(${index})">Delete</button></li>`;
        });
        document.getElementById('todo-list').innerHTML = listHtml;
    }
    window.addGoal = function() {
        let input = document.getElementById('new-goal-input');
        if (input.value.trim() === '') return;
        if(!globalState.goals) globalState.goals = [];
        globalState.goals.push({ text: input.value, done: false });
        input.value = '';
        pushToCloud();
    }
    window.toggleGoal = function(index) {
        globalState.goals[index].done = !globalState.goals[index].done;
        pushToCloud();
    }
    window.deleteGoal = function(index) {
        if (confirm(`Delete: "${globalState.goals[index].text}"?`)) {
            globalState.goals.splice(index, 1);
            pushToCloud();
        }
    }

    /* --- CHARACTERS MANAGER --- */
    function renderCharacters() {
        let folderArea = document.getElementById('character-folders');
        let html = '';
        let chars = globalState.chars || [];
        if(chars.length === 0) {
            folderArea.innerHTML = '<p style="color: #7f8c8d; font-style: italic;">No characters added yet.</p>';
            document.getElementById('sketch-workspace-box').style.display = 'none';
            return;
        }
        chars.forEach((char, index) => {
            let isActive = index === activeCharacterIndex ? 'active' : '';
            html += `<div class="char-folder ${isActive}" onclick="openCharacterFolder(${index})">📁 ${char.name}<button class="char-delete" onclick="event.stopPropagation(); deleteCharacter(${index})">X</button></div>`;
        });
        folderArea.innerHTML = html;
    }

    window.addCharacter = function() {
        let input = document.getElementById('new-char-input');
        let name = input.value.trim();
        if (name === '') return;
        if(!globalState.chars) globalState.chars = [];
        globalState.chars.push({ name: name, ideas: [] });
        activeCharacterIndex = globalState.chars.length - 1;
        input.value = '';
        pushToCloud();
    }

    window.openCharacterFolder = function(index) {
        activeCharacterIndex = index;
        renderCharacters();
        document.getElementById('sketch-workspace-box').style.display = 'block';
        document.getElementById('sketch-title').innerText = globalState.chars[index].name;
        document.getElementById('idea-search').value = '';
        selectedColorFilter = 'all'; 
        renderIdeaBoxes();
        buildColorBallFilters(); 
        document.getElementById('idea-popup-box').style.display = 'none';
    }

    function renderIdeaBoxes() {
        if (activeCharacterIndex === null || !globalState.chars[activeCharacterIndex]) return;
        let ideas = globalState.chars[activeCharacterIndex].ideas || [];
        let boxContainer = document.getElementById('idea-boxes');
        let html = '';

        if (ideas.length === 0) {
            boxContainer.innerHTML = '<p style="color: #7f8c8d; text-align: center; font-style: italic; margin-top:30px;">Empty folder. Drop photos, word files, or text notes down below!</p>';
            return;
        }

        ideas.forEach((idea, index) => {
            let type = idea.type || 'text';
            if (type === 'image') {
                html += `
                    <div class="media-box" data-text="photo image media file" data-color="media">
                        <img src="${idea.data}" alt="Uploaded Character Art">
                        <span style="font-size:12px; color:#bdc3c7;">🖼️ Character Visual Asset</span>
                        <button class="idea-box-delete" onclick="deleteIdea(${index})">X</button>
                    </div>`;
            } else if (type === 'doc') {
                html += `
                    <div class="media-box" data-text="${idea.name.toLowerCase()} doc file word document text" data-color="media">
                        <div class="doc-badge">
                            <span style="font-size: 20px;">📄</span>
                            <div style="text-align: left;">
                                <div style="color: white; font-size:14px;">${idea.name}</div>
                                <div style="color: #7f8c8d; font-size:11px; font-weight:normal;">Attached Word/Text Resource</div>
                            </div>
                        </div>
                        <button class="idea-box-delete" onclick="deleteIdea(${index})">X</button>
                    </div>`;
            } else {
                let text = idea.text || '';
                let color = idea.color || '#e74c3c';
                html += `
                    <div class="red-idea-box" style="background: ${color};" data-text="${text.toLowerCase()}" data-color="${color}">
                        ${text}
                        <button class="idea-box-delete" onclick="deleteIdea(${index})">X</button>
                    </div>`;
            }
        });
        boxContainer.innerHTML = html;
    }

    window.uploadCharacterMedia = function(type) {
        if (activeCharacterIndex === null) return;
        let fileInput = type === 'image' ? document.getElementById('photo-uploader') : document.getElementById('doc-uploader');
        let file = fileInput.files[0];
        if (!file) return;

        let reader = new FileReader();
        reader.onload = function(e) {
            if (!globalState.chars[activeCharacterIndex].ideas) globalState.chars[activeCharacterIndex].ideas = [];
            
            if (type === 'image') {
                globalState.chars[activeCharacterIndex].ideas.push({ type: 'image', data: e.target.result });
            } else {
                globalState.chars[activeCharacterIndex].ideas.push({ type: 'doc', name: file.name });
            }
            fileInput.value = ""; 
            pushToCloud();
        };
        
        if (type === 'image') {
            reader.readAsDataURL(file);
        } else {
            reader.readAsText(file.slice(0, 100)); 
        }
    }

    window.toggleIdeaPopup = function() {
        let popup = document.getElementById('idea-popup-box');
        if (popup.style.display === 'none' || popup.style.display === '') {
            popup.style.display = 'block';
            renderRecentSwatches();
            document.getElementById('new-idea-text').focus();
        } else {
            popup.style.display = 'none';
            document.getElementById('new-idea-text').value = '';
        }
    }

    function renderRecentSwatches() {
        let recents = JSON.parse(localStorage.getItem('recentColors')) || defaultColors;
        let container = document.getElementById('recent-swatches-container');
        let html = '';
        recents.forEach(color => {
            html += `<div class="swatch" style="background: ${color};" onclick="setPickerColor('${color}')"></div>`;
        });
        container.innerHTML = html;
    }

    window.setPickerColor = function(color) {
        document.getElementById('idea-color').value = color;
    }

    window.saveNewIdea = function() {
        let txt = document.getElementById('new-idea-text').value.trim();
        let chosenColor = document.getElementById('idea-color').value;
        if (txt === '') return;

        if (!globalState.chars[activeCharacterIndex].ideas) globalState.chars[activeCharacterIndex].ideas = [];
        globalState.chars[activeCharacterIndex].ideas.push({ type: 'text', text: txt, color: chosenColor });

        let recents = JSON.parse(localStorage.getItem('recentColors')) || defaultColors;
        recents = recents.filter(c => c !== chosenColor);
        recents.unshift(chosenColor);
        if(recents.length > 6) recents.pop();
        localStorage.setItem('recentColors', JSON.stringify(recents));
        
        toggleIdeaPopup();
        pushToCloud();
    }

    function buildColorBallFilters() {
        let ideas = globalState.chars[activeCharacterIndex].ideas || [];
        let container = document.getElementById('color-ball-container');
        let uniqueColors = [];
        
        ideas.forEach(idea => {
            if(idea.type === 'text' || !idea.type) {
                let color = idea.color || '#e74c3c';
                if(!uniqueColors.includes(color)) uniqueColors.push(color);
            }
        });

        let activeAll = selectedColorFilter === 'all' ? 'active' : '';
        let html = `<div class="filter-ball all-colors-ball ${activeAll}" title="Show All Content" onclick="selectColorBallFilter('all', this)"></div>`;
        
        uniqueColors.forEach(c => {
            let activeClass = selectedColorFilter === c ? 'active' : '';
            html += `<div class="filter-ball ${activeClass}" style="background: ${c};" title="Filter by color" onclick="selectColorBallFilter('${c}', this)"></div>`;
        });
        container.innerHTML = html;
    }

    window.selectColorBallFilter = function(color, element) {
        selectedColorFilter = color;
        let balls = document.getElementsByClassName('filter-ball');
        for(let i=0; i<balls.length; i++) {
            balls[i].classList.remove('active');
        }
        element.classList.add('active');
        filterIdeas();
    }

    window.filterIdeas = function() {
        let textQuery = document.getElementById('idea-search').value.toLowerCase();
        let containers = document.getElementById('idea-boxes').children;

        for (let i = 0; i < containers.length; i++) {
            let boxText = containers[i].getAttribute('data-text') || '';
            let boxColor = containers[i].getAttribute('data-color') || '';
            
            let textMatches = boxText.includes(textQuery);
            let colorMatches = (selectedColorFilter === 'all' || boxColor === selectedColorFilter || boxColor === 'media');

            if (textMatches && colorMatches) {
                containers[i].style.display = 'flex';
                if(containers[i].classList.contains('red-idea-box')) containers[i].style.display = 'block';
            } else {
                containers[i].style.display = 'none';
            }
        }
    }

    window.deleteIdea = function(index) {
        if (confirm("Remove this item from your character folder?")) {
            globalState.chars[activeCharacterIndex].ideas.splice(index, 1);
            pushToCloud();
        }
    }

    window.deleteCharacter = function(index) {
        if (confirm(`Delete character folder for "${globalState.chars[index].name}"?`)) {
            globalState.chars.splice(index, 1);
            if (activeCharacterIndex === index) activeCharacterIndex = null;
            else if (activeCharacterIndex > index) activeCharacterIndex--;
            pushToCloud();
        }
    }

    /* --- FLOATING AI HELPER --- */
    window.toggleAiChat = function() {
        let win = document.getElementById('ai-window');
        if(win.style.display === 'none' || win.style.display === '') {
            win.style.display = 'flex';
            document.getElementById('ai-input').focus();
        } else {
            win.style.display = 'none';
        }
    }

    window.sendAiMessage = function() {
        let inputEl = document.getElementById('ai-input');
        let text = inputEl.value.trim();
        if(text === '') return;

        let msgBox = document.getElementById('ai-messages-box');
        msgBox.innerHTML += `<div class="msg user">${text}</div>`;
        inputEl.value = '';
        msgBox.scrollTop = msgBox.scrollHeight;

        setTimeout(() => {
            msgBox.innerHTML += `<div class="msg helper" id="ai-typing">Reading your brilliance... 🔍✨💖</div>`;
            msgBox.scrollTop = msgBox.scrollHeight;
        }, 400);

        setTimeout(() => {
            document.getElementById('ai-typing').remove();
            let cheers = [
                "You are making such incredible progress! Game development takes time, but look at you go! 🌟 Keep it up, you superstar!",
                "Wow, this thought process is completely unique. Your player base is going to love your creativity! I'm cheering so hard for you! 📣💖",
                "Don't ever doubt your skills! Rome wasn't built in a day, and amazing video games take heart. You are doing beautiful work! 🏆",
                "Take a deep breath, stretch your hands, and smile—because your game project is turning into something special! 🎮🌈"
            ];
            let randomCheer = cheers[Math.floor(Math.random() * cheers.length)];
            let reply = `Ooooh, I love this! 😍 ${randomCheer} Everything looks correct and matches your game vibes flawlessly!`;
            
            if(text.toLowerCase().includes('if') || text.toLowerCase().includes('function') || text.toLowerCase().includes('=')) {
                reply = `Look at those coding skills! 💻🔥 I checked over your script logic and it looks fantastic. Coding can be tough, but you are figuring it out perfectly. Keep going, wizard!`;
            } else if (text.length > 25) {
                reply = `Wow, this dialogue/story snippet is breathtaking! 🎭 It has so much emotion and pacing. No typos found either! You have an amazing storytelling gift. Keep creating! ✨`;
            }
            msgBox.innerHTML += `<div class="msg helper">${reply}</div>`;
            msgBox.scrollTop = msgBox.scrollHeight;
        }, 1300);
    }
</script>
